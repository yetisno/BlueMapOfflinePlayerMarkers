name: Java CI with Maven

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn package
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7
        with:
          archive: false
          path: |
            target/*.jar
            !target/original-*.jar

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Build release jar
        run: mvn package
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          jar="$(find target -maxdepth 1 -type f -name '*.jar' ! -name 'original-*.jar' -print -quit)"
          test -n "$jar"
          gh release create "${GITHUB_REF_NAME}" "$jar" --title "${GITHUB_REF_NAME}" --notes "Spigot 26.2 compatibility release." --verify-tag
